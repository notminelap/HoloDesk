name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  visionos-simulator:
    name: visionOS Simulator build
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install visionOS simulator platform
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -q xrsimulator; then
            echo "visionOS SDK already installed"
            exit 0
          fi
          for attempt in 1 2 3; do
            xcodebuild -downloadPlatform visionOS && exit 0
            echo "downloadPlatform attempt $attempt failed; retrying in 30s"
            sleep 30
          done
          sudo xcodebuild -downloadPlatform visionOS

      - name: Build app (visionOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project HoloDesk.xcodeproj \
            -scheme HoloDesk \
            -destination 'generic/platform=visionOS Simulator' \
            -derivedDataPath .build/ci \
            CODE_SIGNING_ALLOWED=NO
