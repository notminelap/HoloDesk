<svg viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="btitle bdesc">
  <title id="btitle">HoloDesk — Liquid Glass design system</title>
  <desc id="bdesc">Brand banner: glass prism mark, HoloDesk wordmark, and floating liquid-glass spatial windows on a deep-space backdrop.</desc>

  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#101A30"/>
      <stop offset="1" stop-color="#150F2E"/>
    </linearGradient>
    <linearGradient id="bWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bRing" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DEBF7"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="bLeft" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bRight" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="bCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A5F3FC" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#67E8F9" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bGlowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bGlowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="1280" height="360" rx="24" fill="url(#bBg)"/>
  <circle cx="180" cy="140" r="240" fill="url(#bGlowL)"/>
  <circle cx="1080" cy="200" r="260" fill="url(#bGlowR)"/>

  <!-- Starfield -->
  <g fill="#E0F2FE">
    <circle cx="420" cy="52"  r="1.6" opacity="0.55"/>
    <circle cx="702" cy="38"  r="1.2" opacity="0.4"/>
    <circle cx="836" cy="72"  r="1.8" opacity="0.5"/>
    <circle cx="540" cy="300" r="1.4" opacity="0.35"/>
    <circle cx="948" cy="322" r="1.5" opacity="0.45"/>
    <circle cx="1236" cy="60" r="1.6" opacity="0.5"/>
    <circle cx="70"  cy="308" r="1.4" opacity="0.4"/>
    <circle cx="264" cy="34"  r="1.2" opacity="0.45"/>
  </g>

  <!-- Orbit line sweeping the banner -->
  <path d="M 60 318 Q 640 128 1244 70" fill="none" stroke="url(#bRing)" stroke-width="2.5"
        stroke-linecap="round" opacity="0.30"/>
  <circle cx="892" cy="128" r="5" fill="#22D3EE" opacity="0.9"/>
  <circle cx="892" cy="128" r="2" fill="#FFFFFF"/>

  <!-- Prism mark -->
  <g transform="translate(58,48) scale(1.03)">
    <path d="M 20.4 142.9 A 112 36 -16 0 1 235.6 81.1"
          fill="none" stroke="url(#bRing)" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <g stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1" stroke-linejoin="round">
      <path d="M128 30 L198 66 L128 102 L58 66 Z"  fill="url(#bTop)"  fill-opacity="0.92"/>
      <path d="M58 66 L128 102 L128 194 L58 158 Z" fill="url(#bLeft)" fill-opacity="0.90"/>
      <path d="M198 66 L128 102 L128 194 L198 158 Z" fill="url(#bRight)" fill-opacity="0.90"/>
    </g>
    <circle cx="128" cy="104" r="34" fill="url(#bCore)"/>
    <path d="M58 66 L128 30 L198 66" fill="none" stroke="#FFFFFF" stroke-opacity="0.6"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 20.4 142.9 A 112 36 -16 0 0 235.6 81.1"
          fill="none" stroke="url(#bRing)" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
    <circle cx="118" cy="146.5" r="4.5" fill="#22D3EE"/>
    <circle cx="118" cy="146.5" r="1.8" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="352" y="178" font-family="ui-sans-serif, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="7" fill="url(#bWord)">HOLODESK</text>
  <text x="356" y="222" font-family="ui-sans-serif, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="21" font-weight="500" letter-spacing="1.5" fill="#9FB3C8">The Spatial Workspace Platform for Apple Vision Pro</text>
  <text x="356" y="258" font-family="ui-sans-serif, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="500" letter-spacing="1" fill="#5B7089">Liquid Glass v2&#160;&#160;·&#160;&#160;32 Spatial Apps&#160;&#160;·&#160;&#160;⌘K Palette&#160;&#160;·&#160;&#160;Zero Dependencies</text>

  <!-- Floating liquid-glass windows -->
  <!-- Back panel: analytics -->
  <g transform="rotate(-7 955 170)">
    <rect x="880" y="70" width="150" height="200" rx="16" fill="#FFFFFF" fill-opacity="0.045"
          stroke="#FFFFFF" stroke-opacity="0.16"/>
    <rect x="894" y="86" width="70" height="8" rx="4" fill="#FFFFFF" opacity="0.18"/>
    <polyline points="894,220 916,196 938,206 962,172 986,184 1012,150"
              fill="none" stroke="url(#bWave)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <rect x="894" y="238" width="96" height="6" rx="3" fill="#FFFFFF" opacity="0.10"/>
    <rect x="894" y="250" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.08"/>
  </g>

  <!-- Middle panel: waveform / audio -->
  <g transform="rotate(3 1105 175)">
    <rect x="1020" y="58" width="170" height="234" rx="18" fill="#FFFFFF" fill-opacity="0.055"
          stroke="#FFFFFF" stroke-opacity="0.20"/>
    <circle cx="1046" cy="90" r="10" fill="url(#bWord)" opacity="0.85"/>
    <rect x="1064" y="82" width="80" height="7" rx="3.5" fill="#FFFFFF" opacity="0.22"/>
    <rect x="1064" y="94" width="52" height="6" rx="3" fill="#FFFFFF" opacity="0.12"/>
    <g stroke="url(#bWave)" stroke-width="4" stroke-linecap="round" opacity="0.85">
      <line x1="1044" y1="150" x2="1044" y2="182"/>
      <line x1="1058" y1="138" x2="1058" y2="194"/>
      <line x1="1072" y1="152" x2="1072" y2="180"/>
      <line x1="1086" y1="128" x2="1086" y2="204"/>
      <line x1="1100" y1="144" x2="1100" y2="188"/>
      <line x1="1114" y1="134" x2="1114" y2="198"/>
      <line x1="1128" y1="150" x2="1128" y2="182"/>
      <line x1="1142" y1="140" x2="1142" y2="192"/>
      <line x1="1156" y1="154" x2="1156" y2="178"/>
    </g>
    <rect x="1044" y="226" width="112" height="6" rx="3" fill="#FFFFFF" opacity="0.14"/>
    <circle cx="1092" cy="229" r="7" fill="#67E8F9" opacity="0.9"/>
    <rect x="1044" y="250" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.10"/>
  </g>

  <!-- Front panel: app grid -->
  <g transform="rotate(7 1194 190)">
    <rect x="1134" y="106" width="120" height="168" rx="14" fill="#FFFFFF" fill-opacity="0.065"
          stroke="#FFFFFF" stroke-opacity="0.22"/>
    <g>
      <rect x="1148" y="122" width="26" height="26" rx="7" fill="#22D3EE" opacity="0.55"/>
      <rect x="1182" y="122" width="26" height="26" rx="7" fill="#38BDF8" opacity="0.45"/>
      <rect x="1216" y="122" width="26" height="26" rx="7" fill="#818CF8" opacity="0.5"/>
      <rect x="1148" y="156" width="26" height="26" rx="7" fill="#A78BFA" opacity="0.5"/>
      <rect x="1182" y="156" width="26" height="26" rx="7" fill="#67E8F9" opacity="0.4"/>
      <rect x="1216" y="156" width="26" height="26" rx="7" fill="#8B5CF6" opacity="0.55"/>
      <rect x="1148" y="190" width="26" height="26" rx="7" fill="#38BDF8" opacity="0.5"/>
      <rect x="1182" y="190" width="26" height="26" rx="7" fill="#A78BFA" opacity="0.45"/>
      <rect x="1216" y="190" width="26" height="26" rx="7" fill="#22D3EE" opacity="0.5"/>
    </g>
    <rect x="1148" y="232" width="94" height="7" rx="3.5" fill="#FFFFFF" opacity="0.16"/>
    <rect x="1148" y="246" width="58" height="6" rx="3" fill="#FFFFFF" opacity="0.10"/>
  </g>
</svg>
